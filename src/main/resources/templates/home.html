<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Home</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f2f5; }
        .container { background: white; padding: 20px; border-radius: 8px; max-width: 800px; margin: auto; }
        h2 { color: #1a73e8; }
        a { color: #1a73e8; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #1a73e8; color: white; padding: 10px; }
        td { padding: 8px; text-align: center; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
<div class="container">
    <h2>MY Website — 20230140068</h2>
    <p>Selamat datang di aplikasi!</p>
    <a href="/form">+ Input Data Mahasiswa</a>

    <h3>Data Mahasiswa</h3>
    <table>
        <tr><th>No</th><th>Nama</th><th>NIM</th><th>Jenis Kelamin</th></tr>
        <tr th:if="${users.isEmpty()}">
            <td colspan="4">Belum ada data</td>
        </tr>
        <tr th:each="user, i : ${users}">
            <td th:text="${i.count}"></td>
            <td th:text="${user.nama}"></td>
            <td th:text="${user.nim}"></td>
            <td th:text="${user.jenisKelamin}"></td>
        </tr>
    </table>
    <br/>
    <a href="/logout">Logout</a>
</div>
</body>
</html>
