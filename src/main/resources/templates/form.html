<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Form Input</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f2f5; }
        .container { background: white; padding: 20px; border-radius: 8px; max-width: 500px; margin: auto; }
        h2 { color: #1a73e8; }
        input[type=text] { width: 100%; padding: 8px; margin: 8px 0 16px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { padding: 10px 20px; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; }
        a { color: #1a73e8; display: block; margin-top: 10px; }
        label { font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h2>Form Input Mahasiswa</h2>
    <form method="post" action="/form">
        <label>Nama:</label>
        <input type="text" name="nama" required/>
        <label>NIM:</label>
        <input type="text" name="nim" required/>
        <label>Jenis Kelamin:</label><br/>
        <input type="radio" name="jenisKelamin" value="Laki-laki" required/> Laki-laki<br/>
        <input type="radio" name="jenisKelamin" value="Perempuan"/> Perempuan<br/><br/>
        <button type="submit">Submit</button>
    </form>
    <a href="/home">Kembali ke Home</a>
</div>
</body>
</html>
