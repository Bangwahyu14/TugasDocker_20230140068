<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Input Mahasiswa</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background-color: #f4f3f0;
            font-family: 'Lato', sans-serif;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }

        /* ── Card ── */
        .form-card {
            background: #ffffff;
            border: 0.5px solid #e0dfd8;
            border-radius: 16px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 440px;
        }

        .form-header {
            margin-bottom: 2rem;
        }

        .form-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 500;
            color: #1a1a1a;
            margin-bottom: 4px;
        }

        .form-header p {
            font-size: 13px;
            color: #888780;
        }

        /* ── Fields ── */
        .field-group {
            margin-bottom: 1.25rem;
        }

        .field-label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: #5F5E5A;
            margin-bottom: 7px;
        }

        .field-input {
            width: 100%;
            height: 42px;
            border: 0.5px solid #c8c7c0;
            border-radius: 8px;
            padding: 0 14px;
            font-size: 14px;
            font-family: 'Lato', sans-serif;
            background: #fafaf8;
            color: #1a1a1a;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .field-input:focus {
            border-color: #534AB7;
            box-shadow: 0 0 0 3px rgba(83, 74, 183, 0.12);
            background: #ffffff;
        }

        .field-input::placeholder {
            color: #b4b2a9;
        }

        /* ── Radio Group ── */
        .radio-group {
            display: flex;
            gap: 12px;
        }

        .radio-option {
            flex: 1;
            position: relative;
        }

        .radio-option input[type="radio"] {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .radio-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            height: 42px;
            border: 0.5px solid #c8c7c0;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            color: #5F5E5A;
            background: #fafaf8;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s, color 0.15s;
            user-select: none;
        }

        .radio-label .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 1.5px solid #c8c7c0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.15s;
            flex-shrink: 0;
        }

        .radio-label .dot-inner {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #534AB7;
            transform: scale(0);
            transition: transform 0.15s;
        }

        .radio-option input[type="radio"]:checked + .radio-label {
            border-color: #534AB7;
            background: #EEEDFE;
            color: #3C3489;
        }

        .radio-option input[type="radio"]:checked + .radio-label .dot {
            border-color: #534AB7;
        }

        .radio-option input[type="radio"]:checked + .radio-label .dot-inner {
            transform: scale(1);
        }

        .radio-label:hover {
            border-color: #534AB7;
        }

        /* ── Divider ── */
        .divider {
            border: none;
            border-top: 0.5px solid #e0dfd8;
            margin: 1.75rem 0 1.5rem;
        }

        /* ── Actions ── */
        .form-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #5F5E5A;
            text-decoration: none;
            font-family: 'Lato', sans-serif;
            transition: color 0.15s;
        }

        .btn-back:hover {
            color: #1a1a1a;
        }

        .btn-submit {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 11px 28px;
            background: #534AB7;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            font-family: 'Lato', sans-serif;
            letter-spacing: 0.03em;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
        }

        .btn-submit:hover {
            background: #3C3489;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="form-card">

    <div class="form-header">
        <h1>Form Input Mahasiswa</h1>
        <p>Isi data mahasiswa dengan lengkap dan benar.</p>
    </div>

    <form action="/submit-form" method="post">

        <!-- Nama -->
        <div class="field-group">
            <label class="field-label" for="nama">Nama</label>
            <input class="field-input" type="text" id="nama" name="nama" placeholder="Masukkan nama lengkap" required>
        </div>

        <!-- NIM -->
        <div class="field-group">
            <label class="field-label" for="nim">NIM</label>
            <input class="field-input" type="text" id="nim" name="nim" placeholder="Masukkan NIM" required>
        </div>

        <!-- Jenis Kelamin -->
        <div class="field-group">
            <label class="field-label">Jenis Kelamin</label>
            <div class="radio-group">
                <div class="radio-option">
                    <input type="radio" id="laki" name="jenisKelamin" value="Laki-laki" required>
                    <label class="radio-label" for="laki">
                        <span class="dot"><span class="dot-inner"></span></span>
                        Laki-laki
                    </label>
                </div>
                <div class="radio-option">
                    <input type="radio" id="perempuan" name="jenisKelamin" value="Perempuan">
                    <label class="radio-label" for="perempuan">
                        <span class="dot"><span class="dot-inner"></span></span>
                        Perempuan
                    </label>
                </div>
            </div>
        </div>

        <hr class="divider">

        <!-- Actions -->
        <div class="form-actions">
            <a href="/home" class="btn-back">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
                Kembali ke Home
            </a>
            <button type="submit" class="btn-submit">
                Simpan Data
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polyline points="9 18 15 12 9 6"/>
                </svg>
            </button>
        </div>

    </form>
</div>

</body>
</html>
